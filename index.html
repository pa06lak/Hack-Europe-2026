<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Abode — swipe your way home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #14171C;
    --ink-soft: #1E222A;
    --paper: #FAF7F2;
    --paper-dim: #ECE6DB;
    --text: #1A1D23;
    --muted: #6B7280;
    --line: rgba(255, 255, 255, 0.08);
    --like: #5C8A6E;
    --nope: #D8634A;
    --shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.5), 0 18px 36px -18px rgba(0, 0, 0, 0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    overscroll-behavior: none;
  }

  body {
    display: grid;
    grid-template-columns: 1fr 320px;
    grid-template-rows: auto 1fr auto;
    grid-template-areas:
      "header header"
      "stage  saved"
      "footer footer";
    gap: 0;
  }

  header {
    grid-area: header;
    padding: 22px 32px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
  }

  .wordmark {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: -0.02em;
  }
  .wordmark span { color: var(--nope); font-style: italic; }

  .tagline {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--muted);
  }

  .stage {
    grid-area: stage;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    min-height: 0;
  }

  .deck {
    position: relative;
    width: min(420px, 92%);
    aspect-ratio: 3 / 4.4;
    max-height: 100%;
  }

  .card {
    position: absolute;
    inset: 0;
    background: var(--paper);
    color: var(--text);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: var(--shadow);
    cursor: grab;
    user-select: none;
    -webkit-user-drag: none;
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.3s;
    will-change: transform;
    display: flex;
    flex-direction: column;
  }
  .card.dragging { transition: none; cursor: grabbing; }
  .card.gone { transition: transform 0.5s ease-in, opacity 0.5s ease-in; opacity: 0; pointer-events: none; }

  .card .photo {
    flex: 1 1 60%;
    background-size: cover;
    background-position: center;
    position: relative;
  }
  .card .photo::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.45) 100%);
  }

  .price-tag {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 2;
    color: var(--paper);
    font-family: 'Fraunces', serif;
    font-size: 34px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
    text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }

  .card .body {
    padding: 18px 20px 22px;
    flex-shrink: 0;
  }

  .addr {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    line-height: 1.15;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 4px;
  }
  .city {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    margin-bottom: 14px;
  }
  .stats {
    display: flex;
    gap: 18px;
    font-size: 13px;
    color: var(--text);
    border-top: 1px solid rgba(0,0,0,0.08);
    padding-top: 12px;
  }
  .stats span { display: flex; align-items: center; gap: 6px; }
  .stats strong { font-weight: 600; }
  .stats em { color: var(--muted); font-style: normal; }

  /* Drag stamps */
  .stamp {
    position: absolute;
    top: 28px;
    padding: 8px 18px;
    border: 3px solid currentColor;
    border-radius: 8px;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: 0.1em;
    opacity: 0;
    pointer-events: none;
    z-index: 3;
    transition: opacity 0.1s;
  }
  .stamp.like { right: 24px; color: var(--like); transform: rotate(14deg); }
  .stamp.nope { left: 24px; color: var(--nope); transform: rotate(-14deg); }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--muted);
    max-width: 320px;
  }
  .empty h2 {
    font-family: 'Fraunces', serif;
    color: var(--paper);
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }
  .empty p { font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
  .empty button {
    background: var(--paper);
    color: var(--ink);
    border: none;
    padding: 12px 22px;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  .empty button:hover { background: #fff; }

  /* Saved list */
  .saved {
    grid-area: saved;
    border-left: 1px solid var(--line);
    padding: 24px 22px;
    overflow-y: auto;
    min-height: 0;
  }
  .saved h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 18px;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .saved .sub {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    margin-bottom: 18px;
  }
  .saved ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .saved li {
    background: var(--ink-soft);
    border-radius: 12px;
    padding: 10px;
    display: flex;
    gap: 12px;
    align-items: center;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .saved li img {
    width: 56px; height: 56px; border-radius: 8px; object-fit: cover; flex-shrink: 0;
  }
  .saved li .meta { font-size: 13px; min-width: 0; }
  .saved li .meta .a { font-family: 'Fraunces', serif; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .saved li .meta .p { color: var(--like); font-weight: 600; font-size: 13px; margin-top: 2px; }
  .saved .none { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* Footer / actions */
  footer {
    grid-area: footer;
    padding: 18px 32px 26px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 22px;
  }

  .action {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: none;
    background: var(--ink-soft);
    color: var(--paper);
    font-size: 26px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: transform 0.15s, background 0.2s, color 0.2s;
    box-shadow: 0 6px 18px rgba(0,0,0,0.35);
  }
  .action:hover { transform: translateY(-2px) scale(1.05); }
  .action:active { transform: translateY(0) scale(0.96); }
  .action:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .action.nope:hover { background: var(--nope); }
  .action.like:hover { background: var(--like); }
  .action.info { width: 48px; height: 48px; font-size: 18px; }

  .hint {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  /* Mobile */
  @media (max-width: 820px) {
    body {
      grid-template-columns: 1fr;
      grid-template-areas:
        "header"
        "stage"
        "footer";
    }
    .saved { display: none; }
    header { padding: 16px 20px; }
    footer { padding: 14px 20px 22px; gap: 16px; }
    .action { width: 56px; height: 56px; font-size: 22px; }
    .hint { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">abode<span>.</span></div>
  <div class="tagline">find the one · swipe to decide</div>
</header>

<main class="stage">
  <div class="deck" id="deck"></div>
  <div class="hint">← nope &nbsp;·&nbsp; → like &nbsp;·&nbsp; drag the card</div>
</main>

<aside class="saved">
  <h3>Saved homes</h3>
  <div class="sub">Your shortlist</div>
  <ul id="savedList"></ul>
  <div class="none" id="savedEmpty">Homes you like will collect here. Swipe right or tap the heart.</div>
</aside>

<footer>
  <button class="action nope" id="btnNope" title="Pass (←)" aria-label="Pass">✕</button>
  <button class="action info" id="btnUndo" title="Undo" aria-label="Undo">↶</button>
  <button class="action like" id="btnLike" title="Like (→)" aria-label="Like">♥</button>
</footer>

<script>
  // --- Data ---------------------------------------------------------------
  const HOUSES = [
    {
      addr: "47 Larkspur Lane",
      city: "Mill Valley, CA",
      price: "$1,495,000",
      beds: 3, baths: 2, sqft: 1840,
      img: "https://images.unsplash.com/photo-1568605114967-8130f3a36994?w=900&q=80"
    },
    {
      addr: "12 Powder Mill Road",
      city: "Hudson Valley, NY",
      price: "$875,000",
      beds: 4, baths: 3, sqft: 2620,
      img: "https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=900&q=80"
    },
    {
      addr: "203 Seacliff Drive",
      city: "Cornwall, UK",
      price: "£640,000",
      beds: 3, baths: 2, sqft: 1980,
      img: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=900&q=80"
    },
    {
      addr: "89 Cedar Ridge",
      city: "Aspen, CO",
      price: "$3,200,000",
      beds: 5, baths: 4, sqft: 4120,
      img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=900&q=80"
    },
    {
      addr: "Flat 4, Hawthorn Mews",
      city: "Hackney, London",
      price: "£785,000",
      beds: 2, baths: 1, sqft: 920,
      img: "https://images.unsplash.com/photo-1502672260266-1c1ef2d93688?w=900&q=80"
    },
    {
      addr: "1107 Olive Street",
      city: "Austin, TX",
      price: "$695,000",
      beds: 3, baths: 2, sqft: 1740,
      img: "https://images.unsplash.com/photo-1605276374104-dee2a0ed3cd6?w=900&q=80"
    },
    {
      addr: "Casa del Sol, 22",
      city: "Tulum, MX",
      price: "$540,000",
      beds: 2, baths: 2, sqft: 1380,
      img: "https://images.unsplash.com/photo-1613490493576-7fde63acd811?w=900&q=80"
    },
    {
      addr: "6 Birch Hollow",
      city: "Stowe, VT",
      price: "$1,120,000",
      beds: 4, baths: 3, sqft: 2440,
      img: "https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde?w=900&q=80"
    },
    {
      addr: "The Glasshouse, Unit 9",
      city: "Brooklyn, NY",
      price: "$1,890,000",
      beds: 3, baths: 2, sqft: 2100,
      img: "https://images.unsplash.com/photo-1600566753190-17f0baa2a6c3?w=900&q=80"
    },
    {
      addr: "Villa Quattro",
      city: "Lake Como, IT",
      price: "€2,450,000",
      beds: 6, baths: 5, sqft: 5300,
      img: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?w=900&q=80"
    }
  ];

  // --- State --------------------------------------------------------------
  let queue = [...HOUSES];
  let saved = [];
  let history = []; // for undo: { house, direction }

  const deck = document.getElementById('deck');
  const savedList = document.getElementById('savedList');
  const savedEmpty = document.getElementById('savedEmpty');
  const btnNope = document.getElementById('btnNope');
  const btnLike = document.getElementById('btnLike');
  const btnUndo = document.getElementById('btnUndo');

  // --- Rendering ----------------------------------------------------------
  function render() {
    deck.innerHTML = '';

    if (queue.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.innerHTML = `
        <h2>That's every home.</h2>
        <p>You've seen the whole listing. Want another go? Your saved homes will stay where they are.</p>
        <button id="resetBtn">Reshuffle the deck</button>
      `;
      deck.appendChild(empty);
      document.getElementById('resetBtn').onclick = reset;
      updateButtons();
      return;
    }

    // Render top 3 cards (top is interactive)
    const visible = queue.slice(0, 3);
    visible.forEach((house, i) => {
      const card = buildCard(house, i);
      deck.appendChild(card);
    });

    // Stack the back cards visually
    [...deck.children].reverse().forEach((card, idxFromTop) => {
      const depth = idxFromTop;
      if (depth === 0) {
        card.style.transform = 'translateY(0) scale(1)';
        card.style.zIndex = 3;
        attachDrag(card);
      } else {
        card.style.transform = `translateY(${depth * 10}px) scale(${1 - depth * 0.04})`;
        card.style.zIndex = 3 - depth;
        card.style.pointerEvents = 'none';
      }
    });

    updateButtons();
  }

  function buildCard(house, indexInQueue) {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.idx = indexInQueue;
    el.innerHTML = `
      <div class="stamp like">LIKE</div>
      <div class="stamp nope">NOPE</div>
      <div class="photo" style="background-image:url('${house.img}')">
        <div class="price-tag">${house.price}</div>
      </div>
      <div class="body">
        <div class="addr">${house.addr}</div>
        <div class="city">${house.city}</div>
        <div class="stats">
          <span><strong>${house.beds}</strong><em>bd</em></span>
          <span><strong>${house.baths}</strong><em>ba</em></span>
          <span><strong>${house.sqft.toLocaleString()}</strong><em>sqft</em></span>
        </div>
      </div>
    `;
    return el;
  }

  function renderSaved() {
    savedList.innerHTML = '';
    if (saved.length === 0) {
      savedEmpty.style.display = 'block';
      return;
    }
    savedEmpty.style.display = 'none';
    saved.forEach(h => {
      const li = document.createElement('li');
      li.innerHTML = `
        <img src="${h.img}" alt="" />
        <div class="meta">
          <div class="a">${h.addr}</div>
          <div class="p">${h.price} · ${h.city}</div>
        </div>
      `;
      savedList.appendChild(li);
    });
  }

  function updateButtons() {
    const hasCards = queue.length > 0;
    btnNope.disabled = !hasCards;
    btnLike.disabled = !hasCards;
    btnUndo.disabled = history.length === 0;
  }

  // --- Drag handling ------------------------------------------------------
  function attachDrag(card) {
    let startX = 0, startY = 0, dx = 0, dy = 0;
    let active = false;

    const onDown = (e) => {
      active = true;
      card.classList.add('dragging');
      const p = pointer(e);
      startX = p.x; startY = p.y;
      e.preventDefault();
    };

    const onMove = (e) => {
      if (!active) return;
      const p = pointer(e);
      dx = p.x - startX;
      dy = p.y - startY;
      const rot = dx / 14;
      card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rot}deg)`;
      const intent = Math.min(Math.abs(dx) / 120, 1);
      card.querySelector('.stamp.like').style.opacity = dx > 0 ? intent : 0;
      card.querySelector('.stamp.nope').style.opacity = dx < 0 ? intent : 0;
    };

    const onUp = () => {
      if (!active) return;
      active = false;
      card.classList.remove('dragging');
      const threshold = 110;
      if (dx > threshold) flyAway(card, 'like');
      else if (dx < -threshold) flyAway(card, 'nope');
      else {
        card.style.transform = 'translate(0,0) rotate(0)';
        card.querySelector('.stamp.like').style.opacity = 0;
        card.querySelector('.stamp.nope').style.opacity = 0;
      }
      dx = 0; dy = 0;
    };

    card.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);

    card.addEventListener('touchstart', onDown, { passive: false });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onUp);

    // Clean up listeners when card is removed
    card._cleanup = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
  }

  function pointer(e) {
    if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    if (e.changedTouches && e.changedTouches[0]) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    return { x: e.clientX, y: e.clientY };
  }

  // --- Decision flow ------------------------------------------------------
  function flyAway(card, direction) {
    const off = direction === 'like' ? window.innerWidth : -window.innerWidth;
    const rot = direction === 'like' ? 25 : -25;
    card.classList.add('gone');
    card.style.transform = `translate(${off * 1.2}px, -80px) rotate(${rot}deg)`;

    const house = queue.shift();
    if (direction === 'like') {
      saved.unshift(house);
      renderSaved();
    }
    history.push({ house, direction });

    if (card._cleanup) card._cleanup();
    setTimeout(render, 280);
  }

  function decide(direction) {
    const top = deck.querySelector('.card:not(.gone)');
    if (!top || queue.length === 0) return;
    flyAway(top, direction);
  }

  function undo() {
    if (history.length === 0) return;
    const last = history.pop();
    queue.unshift(last.house);
    if (last.direction === 'like') {
      saved.shift();
      renderSaved();
    }
    render();
  }

  function reset() {
    queue = [...HOUSES];
    history = [];
    render();
  }

  // --- Wire up ------------------------------------------------------------
  btnNope.addEventListener('click', () => decide('nope'));
  btnLike.addEventListener('click', () => decide('like'));
  btnUndo.addEventListener('click', undo);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') decide('nope');
    else if (e.key === 'ArrowRight') decide('like');
    else if ((e.key === 'z' || e.key === 'Z') && (e.metaKey || e.ctrlKey)) { e.preventDefault(); undo(); }
  });

  render();
  renderSaved();
</script>
</body>
</html>
